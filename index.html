<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irfan Foods ERP – Firebase Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Firebase SDK (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        /* ... your existing CSS styles (unchanged) ... */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        :root {
            --bg: #0a0a10;
            --surface: #14141e;
            --surface-light: #1e1e2c;
            --primary: #f0b90b;
            --primary-soft: rgba(240,185,11,0.10);
            --danger: #ff3860;
            --success: #23d160;
            --text: #e0e0e0;
            --text-dim: #8888a0;
            --border: #252535;
            --sidebar-w: 230px;
            --radius: 16px;
            --shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        body.light-mode {
            --bg: #f4f6fb;
            --surface: #ffffff;
            --surface-light: #f0f2f5;
            --primary: #1a3a5f;
            --primary-soft: rgba(26,58,95,0.07);
            --danger: #e63946;
            --success: #2a9d8f;
            --text: #1a1a2e;
            --text-dim: #5a5a7a;
            --border: #d1d5db;
            --shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            transition: background 0.4s, color 0.4s;
        }
        /* (the rest of your CSS – exactly as before – stays here) */
    </style>
</head>
<body onload="checkLogin()">
<div id="login-screen">
    <div class="login-box">
        <h2>🍦 IRFAN FOODS</h2>
        <input type="text" id="user" placeholder="Username" autocomplete="off">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="doLogin()">🔓 UNLOCK SYSTEM</button>
    </div>
</div>

<div id="main-app">
    <!-- your existing HTML structure unchanged -->
</div>

<!-- ADMIN MODAL -->
<div id="admin-modal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--primary); margin-bottom:1rem;">Admin Security</h3>
        <input type="password" id="adminCodeField" placeholder="Enter Admin Code" style="margin-bottom:1rem;">
        <div style="display:flex; gap:0.7rem; justify-content:flex-end;">
            <button class="gold" onclick="verifyAdmin()">Access</button>
            <button class="btn-outline" onclick="closeAdminModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    // ---------- FIREBASE SETUP ----------
    const firebaseConfig = {
        apiKey: "AIzaSyApS8WHJLTui4r0xMCX_5rXEu8B4-7a7MI",
        authDomain: "irfan-c1be0.firebaseapp.com",
        projectId: "irfan-c1be0",
        storageBucket: "irfan-c1be0.firebasestorage.app",
        messagingSenderId: "561044513175",
        appId: "1:561044513175:web:5c8b977fa334c3ecc1a4d2",
        measurementId: "G-NK718RB038"
    };

    // Initialize Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const dbFirestore = firebase.firestore();
    // Enable offline persistence (optional)
    dbFirestore.enablePersistence().catch((err) => {
        if (err.code == 'failed-precondition') {
            console.warn('Multiple tabs open, persistence only works in one tab');
        } else if (err.code == 'unimplemented') {
            console.warn('Browser does not support persistence');
        }
    });

    // ---------- GLOBAL DATABASE ----------
    // We keep a local cache of the data to avoid excessive Firestore reads.
    // Firestore document ID: "data/main"
    let db = {
        items: [], stock: {}, cash: [], stock_logs: [],
        meterReadings: [], audit: [], pass: '12', adminCode: '11',
        env: { milk: [], elec: [], misc: [] }
    };

    // Load data from Firestore on startup
    async function loadFromFirestore() {
        try {
            const docRef = dbFirestore.collection('data').doc('main');
            const docSnap = await docRef.get();
            if (docSnap.exists) {
                db = docSnap.data();
                // Ensure all required fields exist
                if (!db.audit) db.audit = [];
                if (!db.meterReadings) db.meterReadings = [];
                if (!db.env) db.env = { milk: [], elec: [], misc: [] };
                db.items.forEach(i => { if (i.minLevel === undefined) i.minLevel = 5; });
                return true;
            } else {
                // No data found – use default db and push it to Firestore
                await saveToFirestore();
                return true;
            }
        } catch (error) {
            console.error('Firestore load error:', error);
            // Fallback to localStorage
            let raw = localStorage.getItem('irfan_final_v4');
            if (raw) {
                try {
                    let d = JSON.parse(raw);
                    if (d.items) db = d;
                } catch (e) {}
            }
            return false;
        }
    }

    // Save data to Firestore (overwrite the entire document)
    async function saveToFirestore() {
        try {
            const docRef = dbFirestore.collection('data').doc('main');
            await docRef.set(db, { merge: false });
            // Also update localStorage as cache
            localStorage.setItem('irfan_final_v4', JSON.stringify(db));
        } catch (error) {
            console.error('Firestore save error:', error);
            // Fallback save to localStorage
            localStorage.setItem('irfan_final_v4', JSON.stringify(db));
        }
    }

    // Listen for real-time updates from Firestore (optional)
    function listenToFirestore() {
        dbFirestore.collection('data').doc('main').onSnapshot((doc) => {
            if (doc.exists) {
                const newDb = doc.data();
                // Check if data actually changed to avoid infinite loop
                if (JSON.stringify(newDb) !== JSON.stringify(db)) {
                    db = newDb;
                    // Ensure fields
                    if (!db.audit) db.audit = [];
                    if (!db.meterReadings) db.meterReadings = [];
                    if (!db.env) db.env = { milk: [], elec: [], misc: [] };
                    db.items.forEach(i => { if (i.minLevel === undefined) i.minLevel = 5; });
                    renderAll();
                    if (document.getElementById('allocations').classList.contains('active')) renderAllocations();
                    if (document.getElementById('dash').classList.contains('active')) updateDash();
                    updateHome();
                }
            }
        });
    }

    // ---------- ORIGINAL FUNCTIONS (modified to use Firestore) ----------
    // Replace all direct localStorage calls with Firestore operations
    // The save() function now calls saveToFirestore()
    async function save() {
        await saveToFirestore();
        renderAll();
        if (document.getElementById('allocations').classList.contains('active')) renderAllocations();
        if (document.getElementById('dash').classList.contains('active')) updateDash();
    }

    // On page load
    async function initializeApp() {
        await loadFromFirestore();
        listenToFirestore();   // enable real-time sync
        renderAll();
        updateDash();
        updateHome();
    }

    function extractName(s) {
        if (!s) return '';
        let i = s.lastIndexOf(' (');
        return i === -1 ? s.trim() : s.substring(0, i).trim();
    }
    function getItemCode(name) {
        let it = db.items.find(i => i.name === name);
        return it ? it.id : '???';
    }
    function addAudit(mod, det) {
        db.audit.unshift({ time: new Date().toISOString(), module: mod, details: det });
        if (db.audit.length > 200) db.audit.pop();
        save();
    }

    // Login (unchanged except using db.pass from Firestore)
    function doLogin() {
        if (document.getElementById('user').value === 'irfan' && document.getElementById('pass').value === db.pass) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            sessionStorage.setItem('logged', '1');
            setDates();
            initializeApp(); // load data after login
        } else {
            alert('Invalid credentials!');
        }
    }

    async function checkLogin() {
        if (sessionStorage.getItem('logged')) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            setDates();
            await initializeApp();
        }
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
    }

    function tab(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (el) el.classList.add('active');
        document.getElementById('page-title').innerText = id === 'dash' ? 'Dashboard' : id === 'home' ? 'Home' : id.toUpperCase();
        if (id === 'dash') updateDash();
        if (id === 'meter') calcMeterAvg();
        if (id === 'home') updateHome();
        if (id === 'allocations') renderAllocations();
        renderAll();
    }

    function openAdminModal() { document.getElementById('admin-modal').style.display = 'flex'; }
    function closeAdminModal() { document.getElementById('admin-modal').style.display = 'none'; document.getElementById('adminCodeField').value = ''; }
    function verifyAdmin() {
        if (document.getElementById('adminCodeField').value === (db.adminCode || '11')) {
            closeAdminModal();
            tab('admin', document.querySelectorAll('.nav-item')[8]);
            addAudit('Admin', 'Access');
        } else alert('Wrong Admin Code!');
    }

    // ITEM MASTER
    async function addMaster() {
        let name = document.getElementById('mName').value.trim();
        let minLevel = parseInt(document.getElementById('mMinLevel').value) || 5;
        if (!name) { alert('Please enter item name'); return; }
        let maxNum = 0;
        db.items.forEach(i => {
            let match = i.id.match(/^ITM-(\d+)$/);
            if (match) { let num = parseInt(match[1]); if (num > maxNum) maxNum = num; }
        });
        let newNum = maxNum + 1;
        let newId = 'ITM-' + String(newNum).padStart(3, '0');
        db.items.push({ id: newId, name: name, minLevel: minLevel });
        addAudit('Master', `Added item ${newId} - ${name}`);
        await save();
        document.getElementById('mName').value = '';
        document.getElementById('mMinLevel').value = '5';
    }

    function updateDatalists() {
        document.getElementById('mList').innerHTML = db.items.map(i => `<option value="${i.name}">`).join('');
        document.getElementById('sList').innerHTML = Object.keys(db.stock).map(n => `<option value="${n}">`).join('');
    }
    function setDates() {
        let d = new Date().toISOString().split('T')[0];
        ['sDate', 'sOutDate', 'cDate', 'cardFrom', 'cardTo', 'meterDate', 'repFrom', 'repTo', 'allocDate', 'expDate'].forEach(id => {
            let el = document.getElementById(id);
            if (el) el.value = d;
        });
    }
    function showItemHint(raw) {
        let name = extractName(raw);
        if (!name) { document.getElementById('sCode').value = ''; document.getElementById('sAvail').value = ''; return; }
        document.getElementById('sCode').value = getItemCode(name);
        let st = db.stock[name]; document.getElementById('sAvail').value = st ? st.qty : '0';
        let last = db.stock_logs.filter(l => l.name === name && l.type === 'IN').pop();
        if (last) { document.getElementById('rateHint').innerText = 'Last Purchase Rate: ' + last.price; document.getElementById('sPrice').value = last.price; }
        else { document.getElementById('rateHint').innerText = ''; document.getElementById('sPrice').value = ''; }
    }
    function loadOutCode(raw) {
        let name = extractName(raw);
        if (!name) { document.getElementById('sOutCode').value = ''; document.getElementById('sOutAvail').value = ''; return; }
        document.getElementById('sOutCode').value = getItemCode(name);
        let st = db.stock[name]; document.getElementById('sOutAvail').value = st ? st.qty : '0';
    }

    // INVENTORY
    async function stockIn() {
        let name = extractName(document.getElementById('sSearch').value);
        let date = document.getElementById('sDate').value, q = parseFloat(document.getElementById('sQty').value), p = parseFloat(document.getElementById('sPrice').value);
        if (!name || !date || isNaN(q) || q <= 0 || isNaN(p)) { alert('Fill correctly'); return; }
        if (!db.items.find(i => i.name === name)) { alert('Item not in master'); return; }
        if (!db.stock[name]) db.stock[name] = { qty: 0, price: 0 };
        let totalCost = db.stock[name].qty * db.stock[name].price + q * p;
        let newQty = db.stock[name].qty + q;
        db.stock[name].price = totalCost / newQty; db.stock[name].qty = newQty;
        db.stock_logs.push({ id: Date.now(), date, name, type: 'IN', qty: q, price: p });
        addAudit('Stock', `IN ${name} x${q}`);
        await save();
        document.getElementById('sSearch').value = ''; document.getElementById('sCode').value = '';
        document.getElementById('sAvail').value = ''; document.getElementById('sQty').value = ''; document.getElementById('sPrice').value = '';
        document.getElementById('rateHint').innerText = '';
    }

    async function stockOut() {
        let name = extractName(document.getElementById('sOutName').value);
        let date = document.getElementById('sOutDate').value, q = parseFloat(document.getElementById('sOutQty').value);
        if (!name || !date || isNaN(q) || q <= 0) { alert('Fill correctly'); return; }
        if (!db.stock[name] || db.stock[name].qty < q) { alert('Insufficient stock'); return; }
        let rate = db.stock[name].price;
        db.stock_logs.push({ id: Date.now(), date, name, type: 'OUT', qty: q, price: rate });
        db.stock[name].qty -= q;
        addAudit('Stock', `OUT ${name} x${q}`);
        await save();
        document.getElementById('sOutName').value = ''; document.getElementById('sOutQty').value = '';
    }

    function genStockCard() {
        let name = extractName(document.getElementById('cardSearch').value), from = document.getElementById('cardFrom').value, to = document.getElementById('cardTo').value, bal = 0;
        let logs = db.stock_logs.filter(l => l.name === name && l.date >= from && l.date <= to).sort((a, b) => a.id - b.id);
        document.getElementById('cardBody').innerHTML = logs.map(l => {
            let i = l.type === 'IN' ? l.qty : 0, o = l.type === 'OUT' ? l.qty : 0; bal += i - o;
            return `<tr><td>${l.date}</td><td>${l.type}</td><td>${i || '-'}</td><td>${o || '-'}</td><td>${l.price.toFixed(2)}</td><td><b>${bal}</b></td></tr>`;
        }).join('') || '<tr><td colspan="6">No data</td></tr>';
    }

    // CASHBOOK
    async function addCash() {
        let d = document.getElementById('cDate').value, t = document.getElementById('cType').value, ds = document.getElementById('cDesc').value, a = parseFloat(document.getElementById('cAmt').value);
        if (!d || !ds || isNaN(a)) return;
        db.cash.push({ id: Date.now(), date: d, type: t, desc: ds, amt: a });
        addAudit('Cash', `${t} ${ds} ${a}`);
        await save();
        document.getElementById('cDesc').value = ''; document.getElementById('cAmt').value = '';
    }

    // METER
    async function addMeter() {
        let d = document.getElementById('meterDate').value, v = parseFloat(document.getElementById('meterRead').value);
        if (!d || isNaN(v)) return;
        if (db.meterReadings.find(r => r.date === d)) { alert('Reading for this date already exists'); return; }
        db.meterReadings.push({ id: Date.now(), date: d, reading: v });
        db.meterReadings.sort((a, b) => a.date.localeCompare(b.date));
        addAudit('Meter', `Added reading ${v} on ${d}`);
        await save();
        document.getElementById('meterRead').value = '';
    }
    async function deleteMeter(id) {
        if (confirm('Delete this reading?')) {
            db.meterReadings = db.meterReadings.filter(r => r.id !== id);
            addAudit('Meter', 'Deleted');
            await save();
        }
    }
    async function editMeter(id) {
        let r = db.meterReadings.find(x => x.id === id);
        if (!r) return;
        let newDate = prompt('New date (YYYY-MM-DD):', r.date);
        if (!newDate) return;
        let newReading = parseFloat(prompt('New reading:', r.reading));
        if (isNaN(newReading)) return;
        if (db.meterReadings.find(x => x.id !== id && x.date === newDate)) { alert('Another reading already exists on this date!'); return; }
        r.date = newDate; r.reading = newReading;
        db.meterReadings.sort((a, b) => a.date.localeCompare(b.date));
        addAudit('Meter', 'Edited reading');
        await save();
    }
    function calcMeterAvg() {
        let readings = db.meterReadings; let val = 0;
        if (readings.length >= 2) {
            let days = (new Date(readings[readings.length - 1].date) - new Date(readings[0].date)) / (1000 * 60 * 60 * 24);
            let cons = readings[readings.length - 1].reading - readings[0].reading;
            if (days > 0) val = cons / days;
        }
        document.getElementById('avgDailyText').innerText = val.toFixed(2);
    }

    // HOME & DASHBOARD
    function updateHome() {
        document.getElementById('hs-items').innerText = db.items.length;
        let stockVal = Object.values(db.stock).reduce((a, s) => a + s.qty * s.price, 0);
        document.getElementById('hs-stockval').innerText = 'RS ' + stockVal.toLocaleString();
        let netCash = db.cash.reduce((a, t) => a + (t.type === 'In' ? t.amt : -t.amt), 0);
        document.getElementById('hs-cash').innerText = 'RS ' + netCash.toLocaleString();
        let lowCount = Object.keys(db.stock).filter(n => {
            let min = (db.items.find(i => i.name === n) || {}).minLevel || 5;
            return db.stock[n].qty <= min;
        }).length;
        document.getElementById('hs-low').innerText = lowCount;
        document.getElementById('home-date').innerText = 'Today: ' + new Date().toLocaleDateString('en-PK', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }
    function updateDash() {
        let inc = 0, exp = 0, stockVal = 0;
        db.cash.forEach(t => { if (t.type === 'In') inc += t.amt; else exp += t.amt; });
        Object.values(db.stock).forEach(s => stockVal += s.qty * s.price);
        let net = inc - exp + stockVal;
        document.getElementById('d-in').innerText = 'RS ' + inc.toLocaleString();
        document.getElementById('d-out').innerText = 'RS ' + exp.toLocaleString();
        document.getElementById('d-stock').innerText = 'RS ' + stockVal.toLocaleString();
        document.getElementById('d-profit').innerText = 'RS ' + net.toLocaleString();

        let cashNet = inc - exp;
        document.getElementById('d-cash').innerText = 'RS ' + cashNet.toLocaleString();

        let totalAllocRemaining = 0;
        ['milk', 'elec', 'misc'].forEach(k => {
            let entries = db.env[k] || [];
            let alloc = 0, spent = 0;
            entries.forEach(e => { if (e.type === 'Allocation') alloc += e.amount; else spent += e.amount; });
            totalAllocRemaining += (alloc - spent);
        });
        document.getElementById('d-alloc').innerText = 'RS ' + totalAllocRemaining.toLocaleString();

        let invExp = db.stock_logs.filter(l => l.type === 'OUT').reduce((sum, l) => sum + (l.qty * l.price), 0);
        document.getElementById('d-invexp').innerText = 'RS ' + invExp.toLocaleString();

        let availableCash = cashNet - totalAllocRemaining;
        document.getElementById('d-availcash').innerText = 'RS ' + availableCash.toLocaleString();

        if (donutChart) donutChart.destroy();
        let ctx = document.getElementById('donutChart').getContext('2d');
        donutChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Income', 'Expense', 'Stock Value'],
                datasets: [{ data: [inc, exp, stockVal], backgroundColor: ['#f0b90b', '#ff3860', '#5a5a8a'], borderColor: '#14141e', borderWidth: 3, hoverBorderColor: '#f0b90b' }]
            },
            options: { cutout: '72%', plugins: { legend: { display: false } }, animation: { animateRotate: true, duration: 800 } }
        });
        document.getElementById('chartTotalInv').innerText = 'RS ' + stockVal.toLocaleString();

        let list = '';
        Object.keys(db.stock).forEach(n => {
            let min = (db.items.find(i => i.name === n) || {}).minLevel || 5;
            let q = db.stock[n].qty;
            if (q <= min) list += `<div class="stock-row"><span>${n} (${getItemCode(n)})</span><span style="font-weight:700; font-size:0.8rem;">${q}/${min}</span><div class="progress-bg"><div class="progress-fill" style="width:${Math.min((q / min) * 100, 100)}%"></div></div></div>`;
        });
        document.getElementById('lowStockContainer').innerHTML = list || '<p style="color:var(--success);">✅ All stocks sufficient.</p>';
        updateHome();
    }

    function renderAll() {
        document.getElementById('m-list').innerHTML = db.items.map(i => `<tr><td>${i.id}</td><td>${i.name}</td><td>${i.minLevel ?? 5}</td><td class="action-icons"><span class="edit-icon" onclick="editMaster('${i.id}')">✏️</span><span class="del-icon" onclick="delItem('${i.id}')">🗑️</span></td></tr>`).join('');
        document.getElementById('s-display').innerHTML = Object.keys(db.stock).map(n => {
            let min = (db.items.find(i => i.name === n) || {}).minLevel || 5; let q = db.stock[n].qty;
            return `<tr class="${q <= min ? 'low-stock-row' : ''}"><td>${getItemCode(n)}</td><td>${n}</td><td>${q}</td><td>${min}</td><td>${db.stock[n].price.toFixed(2)}</td><td>RS ${(q * db.stock[n].price).toFixed(0)}</td><td class="action-icons"><span class="edit-icon" onclick="editStock('${n}')">✏️</span><span class="del-icon" onclick="del('stock','${n}')">🗑️</span></td></tr>`;
        }).join('');
        document.getElementById('s-out-list').innerHTML = db.stock_logs.filter(l => l.type === 'OUT').slice(-15).reverse().map(l => `<tr><td>${l.date}</td><td>${getItemCode(l.name)}</td><td>${l.name}</td><td>${l.qty}</td><td>RS ${(l.qty * l.price).toFixed(0)}</td><td class="action-icons"><span class="edit-icon" onclick="editStockLog(${l.id})">✏️</span><span class="del-icon" onclick="delStockLog(${l.id})">🗑️</span></td></tr>`).join('');
        document.getElementById('c-list').innerHTML = db.cash.slice(-10).reverse().map(t => `<tr><td>${t.date}</td><td>${t.type}</td><td>${t.desc}</td><td>RS ${t.amt}</td><td class="action-icons"><span class="edit-icon" onclick="editCash(${t.id})">✏️</span><span class="del-icon" onclick="delCash(${t.id})">🗑️</span></td></tr>`).join('');
        document.getElementById('meter-list').innerHTML = db.meterReadings.map(r => `<tr><td>${r.date}</td><td>${r.reading}</td><td class="action-icons"><span class="edit-icon" onclick="editMeter(${r.id})">✏️</span><span class="del-icon" onclick="deleteMeter(${r.id})">🗑️</span></td></tr>`).join('');
        let totalCons = 0; if (db.meterReadings.length > 1) totalCons = db.meterReadings[db.meterReadings.length - 1].reading - db.meterReadings[0].reading;
        document.getElementById('totalConsumed').innerText = totalCons.toFixed(2);
        document.getElementById('audit-list').innerHTML = db.audit.slice(0, 30).map(a => `<tr><td>${new Date(a.time).toLocaleString()}</td><td>${a.module}</td><td style="font-size:0.75rem;">${a.details}</td></tr>`).join('');
        updateTicker(); updateDatalists(); calcMeterAvg();
    }
    function updateTicker() {
        let msgs = [];
        Object.keys(db.stock).forEach(n => {
            let min = (db.items.find(i => i.name === n) || {}).minLevel || 5;
            if (db.stock[n].qty <= min) msgs.push(`⚠️ ${n} (${getItemCode(n)}): ${db.stock[n].qty}/${min}`);
        });
        document.getElementById('tickerText').innerHTML = msgs.length ? msgs.join(' &nbsp;|&nbsp; ') : '✅ All stocks above minimum level.';
    }

    // DELETE / EDIT (all async save)
    async function delItem(id) { if (confirm('Delete item?')) { db.items = db.items.filter(i => i.id !== id); await save(); } }
    async function delCash(id) { if (confirm('Delete cash entry?')) { db.cash = db.cash.filter(c => c.id !== id); await save(); } }
    async function editCash(id) {
        let c = db.cash.find(x => x.id === id); if (!c) return;
        let newDate = prompt('New date (YYYY-MM-DD):', c.date); if (!newDate) return;
        let newType = prompt('New type (In/Out):', c.type); if (!newType || (newType !== 'In' && newType !== 'Out')) return;
        let newDesc = prompt('New description:', c.desc); if (!newDesc) return;
        let newAmt = parseFloat(prompt('New amount:', c.amt)); if (isNaN(newAmt)) return;
        c.date = newDate; c.type = newType; c.desc = newDesc; c.amt = newAmt;
        addAudit('Cash', 'Edited entry'); await save();
    }
    async function del(module, key) {
        if (module === 'stock') { if (confirm('Delete stock item?')) { delete db.stock[key]; await save(); } }
        else { db[module] = db[module].filter(x => String(x.id) !== String(key) && x.name !== key); await save(); }
    }
    async function editStock(name) {
        if (!db.stock[name]) return;
        let st = db.stock[name];
        let newQty = parseFloat(prompt(`Edit quantity for ${name} (current: ${st.qty}):`, st.qty));
        if (isNaN(newQty) || newQty < 0) return;
        let changeRate = confirm(`Current average rate: ${st.price.toFixed(2)}. Change it?`);
        let newRate = st.price;
        if (changeRate) {
            let rateInput = parseFloat(prompt(`Enter new average rate:`, st.price.toFixed(2)));
            if (!isNaN(rateInput) && rateInput >= 0) newRate = rateInput;
        }
        db.stock[name].qty = newQty;
        db.stock[name].price = newRate;
        addAudit('Stock', `Manually edited ${name}: qty=${newQty}, rate=${newRate.toFixed(2)}`);
        await save();
    }
    async function delStockLog(id) {
        let l = db.stock_logs.find(l => l.id === id);
        if (!l) return;
        if (!confirm('Delete this log?')) return;
        if (l.type === 'OUT') {
            if (db.stock[l.name]) db.stock[l.name].qty += l.qty;
        } else {
            if (db.stock[l.name] && db.stock[l.name].qty >= l.qty) {
                let stock = db.stock[l.name];
                let totalQ = stock.qty - l.qty;
                if (totalQ === 0) {
                    delete db.stock[l.name];
                } else {
                    let totalCost = (stock.qty * stock.price) - (l.qty * l.price);
                    stock.price = totalCost / totalQ;
                    stock.qty = totalQ;
                }
            } else {
                alert('Cannot undo – stock record inconsistent');
                return;
            }
        }
        db.stock_logs = db.stock_logs.filter(x => x.id !== id);
        addAudit('StockLog', 'Deleted');
        await save();
    }
    async function editStockLog(id) {
        let l = db.stock_logs.find(x => x.id === id);
        if (!l) return;
        let newDate = prompt('New date (YYYY-MM-DD)', l.date);
        if (!newDate) return;
        let newQty = parseFloat(prompt('New qty', l.qty));
        if (isNaN(newQty) || newQty <= 0) return;
        let newRate = parseFloat(prompt('New rate', l.price));
        if (isNaN(newRate)) return;
        let stock = db.stock[l.name];
        if (!stock && l.type === 'OUT') {
            alert('Stock record missing – cannot edit this log');
            return;
        }
        if (l.type === 'OUT') {
            let available = stock.qty + l.qty;
            if (available < newQty) { alert('Insufficient stock for the edited quantity'); return; }
            stock.qty += l.qty;
            stock.qty -= newQty;
        } else {
            if (!stock) {
                alert('Stock record missing – cannot edit');
                return;
            }
            if (stock.qty < l.qty) { alert('Cannot reverse old IN – stock record inconsistent'); return; }
            let totalQ = stock.qty - l.qty;
            let totalCost = (stock.qty * stock.price) - (l.qty * l.price);
            if (totalQ === 0) {
                delete db.stock[l.name];
                db.stock[l.name] = { qty: newQty, price: newRate };
            } else {
                stock.price = totalCost / totalQ;
                stock.qty = totalQ;
                let newTotalCost = stock.qty * stock.price + newQty * newRate;
                let newTotalQty = stock.qty + newQty;
                stock.price = newTotalCost / newTotalQty;
                stock.qty = newTotalQty;
            }
        }
        l.date = newDate;
        l.qty = newQty;
        l.price = newRate;
        addAudit('StockLog', 'Edited');
        await save();
    }

    // REPORTS (unchanged except no save needed)
    function genRep(type, format) {
        let from = document.getElementById('repFrom').value, to = document.getElementById('repTo').value;
        if (!from || !to) { alert('Select dates'); return; }
        let head = [], body = [], title = '';
        if (type === 'stock_status') {
            title = 'Inventory'; head = ['ID', 'Item', 'Qty', 'Min', 'Rate', 'Value'];
            body = Object.keys(db.stock).map(n => {
                let s = db.stock[n];
                let min = (db.items.find(i => i.name === n) || {}).minLevel || 5;
                let val = (s.qty * s.price).toFixed(0);
                return [getItemCode(n), n, s.qty, min, s.price.toFixed(2), val];
            });
            let totalVal = Object.keys(db.stock).reduce((sum, n) => sum + (db.stock[n].qty * db.stock[n].price), 0);
            body.push(['TOTAL', '', '', '', '', totalVal.toFixed(0)]);
        } else if (type === 'pl') {
            let inc = 0, exp = 0; db.cash.forEach(t => { if (t.type === 'In') inc += t.amt; else exp += t.amt; });
            let sval = Object.values(db.stock).reduce((a, s) => a + s.qty * s.price, 0);
            title = 'P&L'; head = ['Description', 'Amount'];
            body = [['Income', inc], ['Expense', exp], ['Net Cash', inc - exp], ['Stock Value', sval], ['Overall', inc - exp + sval]];
        } else if (type === 'cashbook') {
            title = 'Cashbook'; head = ['Date', 'Description', 'IN', 'OUT', 'Balance'];
            let openingBalance = db.cash.filter(c => c.date < from).reduce((sum, c) => sum + (c.type === 'In' ? c.amt : -c.amt), 0);
            let entries = db.cash.filter(c => c.date >= from && c.date <= to);
            entries.sort((a, b) => a.date.localeCompare(b.date) || (a.id - b.id));
            let totalIn = 0, totalOut = 0;
            let running = openingBalance;
            if (Math.abs(openingBalance) > 0.001) {
                body.push(['OPENING', '', '', '', openingBalance.toLocaleString()]);
            }
            body = body.concat(entries.map(c => {
                let inAmt = c.type === 'In' ? c.amt : 0;
                let outAmt = c.type === 'Out' ? c.amt : 0;
                totalIn += inAmt;
                totalOut += outAmt;
                running += (inAmt - outAmt);
                return [c.date, c.desc, inAmt, outAmt, running.toLocaleString()];
            }));
            body.push(['TOTAL', '', totalIn, totalOut, '']);
        } else if (type === 'stock_history') {
            title = 'Stock Movement'; head = ['Date', 'ID', 'Item', 'Action', 'Qty', 'Rate'];
            body = db.stock_logs.filter(x => x.date >= from && x.date <= to)
                .map(x => [x.date, getItemCode(x.name), x.name, x.type, x.qty, x.price.toFixed(2)]);
        } else if (type === 'lowstock') {
            title = 'Low Stock'; head = ['ID', 'Item', 'Qty', 'Min'];
            Object.keys(db.stock).forEach(n => {
                let min = (db.items.find(i => i.name === n) || {}).minLevel || 5;
                if (db.stock[n].qty <= min) body.push([getItemCode(n), n, db.stock[n].qty, min]);
            });
        } else if (type === 'audit') {
            title = 'Audit Trail'; head = ['Time', 'Module', 'Details'];
            body = db.audit.filter(a => a.time.slice(0, 10) >= from && a.time.slice(0, 10) <= to)
                .map(a => [new Date(a.time).toLocaleString(), a.module, a.details]);
        }
        if (body.length === 0) { alert('No data'); return; }
        if (format === 'pdf') {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.text(`IRFAN FOODS - ${title}`, 14, 15);
            doc.autoTable({ head: [head], body: body, startY: 22, theme: 'grid', headStyles: { fillColor: [240, 185, 11] } });
            doc.save(`${title}.pdf`);
        } else {
            let ws = XLSX.utils.aoa_to_sheet([ [`IRFAN FOODS - ${title}`], head, ...body ]);
            let wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Report');
            XLSX.writeFile(wb, `${title}.xlsx`);
        }
    }

    // UTILS (unchanged except async where needed)
    function exportBackup() { let blob = new Blob([JSON.stringify(db)], { type: 'application/json' }); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'IrfanBackup.json'; a.click(); addAudit('Admin', 'Backup exported'); }
    async function importBackup(input) {
        let reader = new FileReader();
        reader.onload = async function () {
            try {
                let imported = JSON.parse(reader.result);
                if (imported.items) {
                    db = imported;
                    if (!db.audit) db.audit = []; if (!db.meterReadings) db.meterReadings = []; if (!db.env) db.env = { milk: [], elec: [], misc: [] };
                    db.items.forEach(i => { if (i.minLevel === undefined) i.minLevel = 5; });
                    await save();
                    alert('Imported!');
                    location.reload();
                } else {
                    alert('Invalid file');
                }
            } catch (e) { alert('Invalid file'); }
        };
        if (input.files[0]) reader.readAsText(input.files[0]);
    }
    function toggleTheme() { document.body.classList.toggle('light-mode'); localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark'); if (document.getElementById('dash').classList.contains('active')) updateDash(); }
    function logout() { sessionStorage.clear(); location.reload(); }
    async function changePass() { let p = document.getElementById('newPass').value; if (p) { db.pass = p; await save(); alert('Password updated'); } else alert('Enter new password'); }
    async function changeAdminCode() { let c = document.getElementById('newAdminCode').value; if (c) { db.adminCode = c; await save(); alert('Admin code updated'); } else alert('Enter new code'); }
    async function clearAudit() { if (confirm('Clear audit log?')) { db.audit = []; await save(); } }

    // ALLOCATION TRACKER (async)
    function getEnvKey(cat) {
        if (cat === 'Milk Powder') return 'milk';
        if (cat === 'Electricity') return 'elec';
        return 'misc';
    }
    async function addAllocation() {
        let cat = document.getElementById('allocCat').value;
        let date = document.getElementById('allocDate').value;
        let amt = parseFloat(document.getElementById('allocAmt').value);
        if (!date || isNaN(amt) || amt <= 0) { alert('Fill correctly'); return; }
        let key = getEnvKey(cat);
        db.env[key].push({ id: Date.now(), date, type: 'Allocation', amount: amt, desc: '' });
        addAudit('Allocation', `Added ${cat} allocation ${amt}`);
        await save();
        document.getElementById('allocAmt').value = 1000;
    }
    async function addAllocationExpense() {
        let cat = document.getElementById('expCat').value;
        let date = document.getElementById('expDate').value;
        let desc = document.getElementById('expDesc').value.trim();
        let amt = parseFloat(document.getElementById('expAmt').value);
        if (!date || isNaN(amt) || amt <= 0 || !desc) { alert('Fill correctly'); return; }
        let key = getEnvKey(cat);
        db.env[key].push({ id: Date.now(), date, type: 'Expense', amount: amt, desc });
        addAudit('Allocation', `Recorded expense ${cat} - ${desc} ${amt}`);
        await save();
        document.getElementById('expDesc').value = '';
        document.getElementById('expAmt').value = '';
    }
    function renderAllocations() {
        let money = n => 'RS ' + n.toLocaleString();
        let cards = '';
        let categories = [
            { name: 'Milk Powder', key: 'milk' },
            { name: 'Electricity', key: 'elec' },
            { name: 'Miscellaneous', key: 'misc' }
        ];
        categories.forEach(c => {
            let entries = db.env[c.key] || [];
            let allocated = 0, spent = 0;
            entries.forEach(e => { if (e.type === 'Allocation') allocated += e.amount; else spent += e.amount; });
            let remaining = allocated - spent;
            cards += `<div class="dash-card"><h3>${c.name}</h3><div style="display:flex; justify-content:space-between; font-size:0.9rem; margin:0.4rem 0;"><span>Allocated:</span><span>${money(allocated)}</span></div><div style="display:flex; justify-content:space-between; font-size:0.9rem; margin:0.4rem 0;"><span>Spent:</span><span style="color:#ff3860;">${money(spent)}</span></div><div style="display:flex; justify-content:space-between; font-size:0.9rem; font-weight:700; color:var(--primary);"><span>Remaining:</span><span>${money(remaining)}</span></div></div>`;
        });
        document.getElementById('allocCards').innerHTML = cards;
        let all = [];
        categories.forEach(c => {
            (db.env[c.key] || []).forEach(e => { all.push({ ...e, category: c.name }); });
        });
        all.sort((a, b) => b.id - a.id);
        let logHtml = all.map(e => `<tr><td>${e.date}</td><td>${e.category}</td><td>${e.type}</td><td>${e.amount}</td><td>${e.desc || '-'}</td><td class="action-icons"><span class="del-icon" onclick="delEnvTx(${e.id})">🗑️</span></td></tr>`).join('');
        document.getElementById('allocLog').innerHTML = logHtml || '<tr><td colspan="6">No transactions</td></tr>';
    }
    async function delEnvTx(id) {
        if (!confirm('Delete transaction?')) return;
        ['milk', 'elec', 'misc'].forEach(key => { db.env[key] = db.env[key].filter(e => e.id != id); });
        addAudit('Allocation', 'Deleted transaction');
        await save();
    }

    // Master edit (if exists)
    async function editMaster(id) {
        let item = db.items.find(i => i.id === id);
        if (!item) return;
        let newName = prompt('New name:', item.name);
        if (newName) {
            item.name = newName;
            addAudit('Master', `Edited item ${id} name`);
        }
        let newMin = parseInt(prompt('New min level:', item.minLevel));
        if (!isNaN(newMin) && newMin >= 0) {
            item.minLevel = newMin;
        }
        await save();
    }

    // Make sure global variables/functions are accessible
    window.donutChart = null;
